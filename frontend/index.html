<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claros</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      background: #0f1117; color: #e8eaed; min-height: 100vh;
    }
    .app { display: flex; height: 100vh; }

    /* ── Left panel: worksheet ── */
    .panel-left {
      flex: 1; min-width: 0; overflow-y: auto;
      padding: 1.5rem 2rem 2rem;
      border-right: 1px solid #1e2530;
    }
    .header { margin-bottom: 1.25rem; }
    .brand {
      font-size: 1.2rem; font-weight: 700; letter-spacing: 0.08em;
      color: #f59e0b;
    }
    .brand-sub {
      font-size: 0.78rem; color: #6b7280; margin-top: 0.1rem;
      letter-spacing: 0.01em;
    }
    .assignment-title {
      font-size: 1.05rem; font-weight: 600; margin-bottom: 1rem; color: #e8eaed;
    }

    /* Upload */
    .upload-row { display: flex; gap: 0.75rem; align-items: stretch; margin-bottom: 1.25rem; }
    .upload-zone {
      flex: 1; border: 1.5px dashed #374151; border-radius: 10px;
      padding: 1.15rem; text-align: center; cursor: pointer;
      background: #161920; transition: border-color 0.2s;
      display: flex; align-items: center; justify-content: center;
    }
    .upload-zone:hover { border-color: #f59e0b; }
    .upload-zone input { display: none; }
    .upload-zone span { font-size: 0.84rem; color: #9ca3af; }
    .btn-test-pdf {
      flex-shrink: 0; padding: 0.5rem 0.85rem;
      font-size: 0.84rem; white-space: nowrap;
      background: #1e2530; color: #d1d5db;
      border: 1px solid #374151; border-radius: 10px;
      cursor: pointer; transition: background 0.15s;
    }
    .btn-test-pdf:hover { background: #252d3a; }
    .btn-test-pdf:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Question cards */
    .question-card {
      background: #161920; border: 1px solid #1e2530; border-radius: 12px;
      padding: 1.1rem 1.15rem; margin-bottom: 0.85rem;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .question-card.writing {
      border-color: #f59e0b; box-shadow: 0 0 0 2px rgba(245,158,11,0.22);
    }
    .question-card.answer-ready { border-color: #22c55e; }
    .question-label {
      font-weight: 600; font-size: 0.84rem; margin-bottom: 0.3rem;
      color: #d1d5db; display: flex; align-items: center; gap: 0.5rem;
    }
    .ready-badge {
      font-size: 0.62rem; font-weight: 600; padding: 0.12rem 0.5rem;
      border-radius: 999px; background: #14532d; color: #86efac; display: none;
    }
    .question-card.answer-ready .ready-badge { display: inline-block; }
    .question-text {
      font-size: 0.86rem; color: #9ca3af; margin-bottom: 0.7rem;
      white-space: pre-wrap; word-break: break-word; line-height: 1.55;
    }
    .answer-field {
      min-height: 56px; width: 100%;
      background: #0f1117; border: 1px solid #252a33; border-radius: 8px;
      padding: 0.65rem 0.8rem;
      font-family: inherit; font-size: 0.86rem; color: #e8eaed;
      resize: vertical; white-space: pre-wrap; word-break: break-word; line-height: 1.5;
    }
    .answer-field:empty::before { content: attr(data-placeholder); color: #4b5563; pointer-events: none; }
    .answer-field:focus { outline: none; border-color: #f59e0b; }

    /* ── Right panel: session ── */
    .panel-right {
      width: 380px; flex-shrink: 0; padding: 1.25rem;
      display: flex; flex-direction: column; background: #0b0d11;
    }
    .section-label {
      font-size: 0.62rem; font-weight: 700; letter-spacing: 0.12em;
      text-transform: uppercase; color: #6b7280; margin-bottom: 0.45rem;
    }

    /* Status indicator */
    .status-bar {
      display: flex; align-items: center; justify-content: center;
      padding: 0.6rem; border-radius: 10px; margin-bottom: 0.75rem;
      font-size: 0.82rem; font-weight: 600; letter-spacing: 0.03em;
      transition: background 0.3s, color 0.3s;
    }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      margin-right: 8px; flex-shrink: 0;
    }
    .status-bar.idle { background: #161920; color: #6b7280; }
    .status-bar.idle .status-dot { background: #4b5563; }
    .status-bar.connecting { background: #172554; color: #93c5fd; }
    .status-bar.connecting .status-dot { background: #60a5fa; animation: pulse 1.2s ease-in-out infinite; }
    .status-bar.listening { background: #14532d; color: #86efac; }
    .status-bar.listening .status-dot { background: #22c55e; animation: pulse 1.5s ease-in-out infinite; }
    .status-bar.speaking { background: #172554; color: #93c5fd; }
    .status-bar.speaking .status-dot { background: #60a5fa; animation: pulse 0.7s ease-in-out infinite; }
    .status-bar.writing { background: #422006; color: #fcd34d; }
    .status-bar.writing .status-dot { background: #f59e0b; animation: pulse 1s ease-in-out infinite; }
    @keyframes pulse {
      0%, 100% { opacity: 0.35; transform: scale(0.85); }
      50% { opacity: 1; transform: scale(1.15); }
    }

    /* Meter */
    .meter-wrap { height: 3px; background: #161920; border-radius: 2px; overflow: hidden; margin-bottom: 0.85rem; }
    .meter-bar { height: 100%; width: 0%; background: #22c55e; transition: width 0.05s ease; }

    /* Transcript */
    .transcript {
      flex: 1; min-height: 120px; overflow-y: auto;
      background: #0f1117; border: 1px solid #1e2530;
      border-radius: 10px; padding: 0.7rem 0.8rem;
      font-size: 0.82rem; line-height: 1.6;
    }
    .msg { padding: 0.25rem 0; word-break: break-word; }
    .msg + .msg { margin-top: 0.1rem; }
    .msg-label { font-weight: 600; margin-right: 0.3rem; font-size: 0.78rem; }
    .msg.user .msg-label { color: #60a5fa; }
    .msg.claros .msg-label { color: #4ade80; }
    .msg.user { color: #c7d2e0; }
    .msg.claros { color: #d1dbe6; }
    .msg.partial { opacity: 0.55; }

    .errors { font-size: 0.82rem; color: #fca5a5; margin-top: 0.4rem; min-height: 1.1rem; }

    /* Buttons */
    .btn {
      display: block; width: 100%; padding: 0.7rem 1rem;
      font-size: 0.95rem; font-weight: 600; border: none;
      border-radius: 10px; cursor: pointer;
      background: #f59e0b; color: #1a1d23; margin-top: 0.5rem;
      transition: background 0.15s;
    }
    .btn:hover { background: #fbbf24; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn.stop { background: #dc2626; color: #fff; }
    .btn.stop:hover { background: #ef4444; }
    .btn.export { background: #22c55e; color: #0f1419; margin-top: 1rem; font-size: 0.9rem; }
    .btn.export:hover { background: #4ade80; }
    .btn.export { display: none; }
    .btn.export.visible { display: block; }
  </style>
</head>
<body>
  <div class="app">
    <div class="panel-left">
      <div class="header">
        <div class="brand">Claros</div>
        <div class="brand-sub">Voice-guided worksheet assistant</div>
      </div>
      <div class="assignment-title" id="assignmentTitle">Upload an assignment PDF</div>
      <div class="upload-row">
        <div class="upload-zone" id="uploadZone">
          <input type="file" id="fileInput" accept=".pdf">
          <span id="uploadLabel">Drop PDF or click to upload</span>
        </div>
        <button type="button" class="btn-test-pdf" id="testPdfBtn">Use Test PDF</button>
      </div>
      <div id="questionsContainer"></div>
      <button class="btn export" id="exportBtn">Export PDF</button>
    </div>
    <div class="panel-right">
      <div class="section-label">Session</div>
      <div id="status" class="status-bar idle">
        <span class="status-dot"></span>
        <span id="statusLabel">Ready</span>
      </div>
      <div class="meter-wrap"><div id="meterBar" class="meter-bar"></div></div>
      <div class="section-label">Conversation</div>
      <div id="transcript" class="transcript"></div>
      <div id="errors" class="errors"></div>
      <button class="btn" id="micBtn" disabled>Start Session</button>
    </div>
  </div>

  <script>
    (function () {
      const SAMPLE_RATE = 16000;
      const OUT_SAMPLE_RATE = 24000;
      let state = { assignmentId: null, title: '', questions: [], answers: {} };

      const assignmentTitleEl = document.getElementById('assignmentTitle');
      const uploadZone = document.getElementById('uploadZone');
      const fileInput = document.getElementById('fileInput');
      const uploadLabel = document.getElementById('uploadLabel');
      const questionsContainer = document.getElementById('questionsContainer');
      const exportBtn = document.getElementById('exportBtn');
      const statusEl = document.getElementById('status');
      const statusLabel = document.getElementById('statusLabel');
      const meterBar = document.getElementById('meterBar');
      const transcriptEl = document.getElementById('transcript');
      const errorsEl = document.getElementById('errors');
      const micBtn = document.getElementById('micBtn');

      /* ── Upload ── */
      uploadZone.addEventListener('click', () => fileInput.click());
      uploadZone.addEventListener('dragover', (e) => { e.preventDefault(); uploadZone.classList.add('hover'); });
      uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('hover'));
      uploadZone.addEventListener('drop', (e) => {
        e.preventDefault();
        uploadZone.classList.remove('hover');
        const file = e.dataTransfer.files[0];
        if (file && file.name.toLowerCase().endsWith('.pdf')) doUpload(file);
      });
      fileInput.addEventListener('change', () => {
        const file = fileInput.files[0];
        if (file) doUpload(file);
      });

      const testPdfBtn = document.getElementById('testPdfBtn');
      testPdfBtn.addEventListener('click', async () => {
        uploadLabel.textContent = 'Loading test PDF…';
        testPdfBtn.disabled = true;
        errorsEl.textContent = '';
        try {
          const r = await fetch('/test-assignment.pdf');
          if (!r.ok) throw new Error('Failed to load test PDF');
          const blob = await r.blob();
          const file = new File([blob], 'test_assignment.pdf', { type: 'application/pdf' });
          await doUpload(file);
        } catch (err) {
          errorsEl.textContent = err.message || 'Failed to load test PDF';
        } finally {
          uploadLabel.textContent = 'Drop PDF or click to upload';
          testPdfBtn.disabled = false;
        }
      });

      async function doUpload(file) {
        uploadLabel.textContent = 'Uploading…';
        errorsEl.textContent = '';
        const form = new FormData();
        form.append('file', file);
        try {
          const r = await fetch('/upload', { method: 'POST', body: form });
          if (!r.ok) {
            const err = await r.json().catch(() => ({}));
            throw new Error(err.detail || err.error || 'Upload failed');
          }
          const data = await r.json();
          console.log('[doUpload] Full upload response:', JSON.stringify(data, null, 2));
          state.assignmentId = data.assignment_id;
          state.title = data.title || 'Assignment';
          state.questions = data.questions || [];
          state.answers = {};
          assignmentTitleEl.textContent = state.title;
          renderQuestions();
          micBtn.disabled = false;
          uploadLabel.textContent = 'Drop PDF or click to upload';
        } catch (err) {
          uploadLabel.textContent = 'Drop PDF or click to upload';
          errorsEl.textContent = err.message || 'Upload failed';
        }
      }

      /* ── Question rendering ── */
      function renderQuestions() {
        console.log('[renderQuestions] Received state.questions:', state.questions?.length, state.questions);
        questionsContainer.innerHTML = '';
        state.questions.forEach((q) => {
          const card = document.createElement('div');
          card.className = 'question-card';
          card.dataset.questionId = String(q.id);
          const questionText = (q.text != null && q.text !== '') ? String(q.text) : '';
          card.innerHTML = '<div class="question-label">Question ' + q.id + '<span class="ready-badge">Answer stated</span></div><div class="question-text"></div><div class="answer-field" data-question-id="' + q.id + '" data-placeholder="Answer will appear here…" contenteditable="true" spellcheck="true"></div>';
          const questionTextEl = card.querySelector('.question-text');
          const answerEl = card.querySelector('.answer-field');
          if (questionTextEl) {
            questionTextEl.textContent = questionText;
            console.log('[renderQuestions] Card for Q' + q.id + ': set question-text to', questionText ? questionText.substring(0, 50) + (questionText.length > 50 ? '...' : '') : '(empty)');
          }
          answerEl.addEventListener('input', () => {
            state.answers[q.id] = answerEl.textContent;
            if (answerEl.textContent.trim()) exportBtn.classList.add('visible');
          });
          questionsContainer.appendChild(card);
        });
        console.log('[renderQuestions] Created', state.questions?.length || 0, 'card(s). DOM children:', questionsContainer.children.length);
      }

      function getAnswerEl(questionId) {
        return document.querySelector('.answer-field[data-question-id="' + questionId + '"]');
      }
      function getCardEl(questionId) {
        return document.querySelector('.question-card[data-question-id="' + questionId + '"]');
      }

      const API_BASE = location.origin || 'http://127.0.0.1:8000';

      let liveSession = null;
      let audioContext = null;
      let mediaStream = null;
      let sourceNode = null;
      let processorNode = null;
      let playbackContext = null;
      let nextPlaybackTime = 0;
      let scheduledSources = [];
      let conversationContext = [];
      let answerReady = {};
      let answerCandidate = {};
      let currentQuestion = null;
      let clarosOutputBuffer = '';
      let userTranscriptBuffer = '';
      let writeInProgress = false;
      let keepaliveInterval = null;

      var WRITE_INTENT_RE = /\b(write|put\s+that\s+down|answer\s+question|write\s+my\s+answer|write\s+it\s+down|write\s+that)\b/i;
      var QUESTION_NUM_RE = /question\s*(\d+)/i;
      var CLAROS_WRITE_PHRASE_RE = /let me write that for question\s*(\d+)/i;
      var ANSWER_STATED_RE = /(?:my|the|final)\s+answer\s+is\b|i\s+think\s+(?:it'?s|it\s+is|the\s+answer\s+is)\b|(?:my|the)\s+final\s+answer\b|that'?s\s+my\s+answer\b|so\s+(?:it'?s|it\s+is|the\s+answer\s+is)\b/i;

      function int16ArrayToBase64(int16Arr) {
        var bytes = new Uint8Array(int16Arr.buffer);
        var binary = '';
        for (var i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
        return btoa(binary);
      }

      /* ── Status ── */
      let currentMode = 'idle';

      function setStatus(mode) {
        currentMode = mode;
        var labels = {
          idle: 'Ready',
          connecting: 'Connecting\u2026',
          listening: 'Listening',
          speaking: 'Claros is speaking',
          writing: 'Writing answer\u2026'
        };
        statusLabel.textContent = labels[mode] || mode;
        statusEl.className = 'status-bar ' + mode;
      }

      /* ── Transcript (streaming) ── */
      let activeClarosMsg = null;
      let userPartialEl = null;
      let userPartialText = '';

      function addTranscript(speaker, text) {
        if (!text || !text.trim()) return;
        if (speaker === 'claros') {
          if (!activeClarosMsg) {
            activeClarosMsg = document.createElement('div');
            activeClarosMsg.className = 'msg claros';
            var label = document.createElement('span');
            label.className = 'msg-label';
            label.textContent = 'Claros ';
            activeClarosMsg.appendChild(label);
            transcriptEl.appendChild(activeClarosMsg);
          }
          activeClarosMsg.appendChild(document.createTextNode(text));
        } else {
          activeClarosMsg = null;
          var div = document.createElement('div');
          div.className = 'msg user';
          var label = document.createElement('span');
          label.className = 'msg-label';
          label.textContent = 'You ';
          div.appendChild(label);
          div.appendChild(document.createTextNode(text));
          transcriptEl.appendChild(div);
        }
        transcriptEl.scrollTop = transcriptEl.scrollHeight;
      }

      function showUserPartial(text) {
        userPartialText += text;
        if (!userPartialEl) {
          userPartialEl = document.createElement('div');
          userPartialEl.className = 'msg user partial';
          var label = document.createElement('span');
          label.className = 'msg-label';
          label.textContent = 'You ';
          userPartialEl.appendChild(label);
          userPartialEl._tn = document.createTextNode('');
          userPartialEl.appendChild(userPartialEl._tn);
          transcriptEl.appendChild(userPartialEl);
        }
        userPartialEl._tn.textContent = userPartialText;
        transcriptEl.scrollTop = transcriptEl.scrollHeight;
      }

      function clearUserPartial() {
        if (userPartialEl) {
          userPartialEl.remove();
          userPartialEl = null;
        }
        userPartialText = '';
      }

      /* ── Audio playback with barge-in support ── */
      function queuePcm24kChunk(base64Data) {
        if (!playbackContext) playbackContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: OUT_SAMPLE_RATE });
        if (playbackContext.state === 'suspended') playbackContext.resume();
        var ctx = playbackContext;
        var binary = atob(base64Data);
        var byteLength = binary.length;
        var numSamples = byteLength >> 1;
        var bytes = new Uint8Array(byteLength);
        for (var i = 0; i < byteLength; i++) bytes[i] = binary.charCodeAt(i);
        var int16Samples = new Int16Array(bytes.buffer, 0, numSamples);
        var buf = ctx.createBuffer(1, numSamples, OUT_SAMPLE_RATE);
        var channel = buf.getChannelData(0);
        for (var i = 0; i < numSamples; i++) channel[i] = int16Samples[i] / 32768;
        var startTime = Math.max(ctx.currentTime, nextPlaybackTime);
        var source = ctx.createBufferSource();
        source.buffer = buf;
        source.connect(ctx.destination);
        source.start(startTime);
        nextPlaybackTime = startTime + buf.duration;
        scheduledSources.push(source);
        source.onended = function () {
          var idx = scheduledSources.indexOf(source);
          if (idx !== -1) scheduledSources.splice(idx, 1);
        };
      }

      function clearPlayback() {
        for (var i = 0; i < scheduledSources.length; i++) {
          try { scheduledSources[i].stop(); } catch (_) {}
        }
        scheduledSources = [];
        nextPlaybackTime = 0;
      }

      function triggerWrite(questionId) {
        if (writeInProgress) return;
        var el = getAnswerEl(questionId);
        var card = getCardEl(questionId);
        if (!el) return;
        writeInProgress = true;
        setStatus('writing');
        el.textContent = '';
        state.answers[questionId] = '';
        if (card) card.classList.add('writing');
        var url = API_BASE + '/api/write/' + state.assignmentId;
        var body = JSON.stringify({
          question_id: questionId,
          conversation: conversationContext,
          answer_candidate: answerCandidate[questionId] || ''
        });
        fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: body })
          .then(function (res) {
            if (!res.ok) {
              return res.json().catch(function () { return {}; }).then(function (data) {
                throw new Error(data.detail || res.statusText || 'Write failed');
              });
            }
            return res.body.getReader();
          })
          .then(function (reader) {
            var decoder = new TextDecoder();
            function read() {
              return reader.read().then(function (_ref) {
                var done = _ref.done;
                var value = _ref.value;
                if (done) return;
                var text = decoder.decode(value, { stream: true });
                if (text) {
                  el.textContent = (el.textContent || '') + text;
                  state.answers[questionId] = el.textContent;
                  exportBtn.classList.add('visible');
                }
                return read();
              });
            }
            return read();
          })
          .catch(function (err) {
            errorsEl.textContent = err.message || 'Write failed';
          })
          .finally(function () {
            writeInProgress = false;
            if (card) card.classList.remove('writing');
            setStatus(liveSession ? 'listening' : 'idle');
          });
      }

      /* ── Mic level meter ── */
      function startMeter(stream) {
        var ctx = new (window.AudioContext || window.webkitAudioContext)();
        var src = ctx.createMediaStreamSource(stream);
        var analyser = ctx.createAnalyser();
        analyser.fftSize = 256;
        analyser.smoothingTimeConstant = 0.8;
        src.connect(analyser);
        var data = new Uint8Array(analyser.frequencyBinCount);
        function tick() {
          if (!mediaStream || !mediaStream.active) return;
          analyser.getByteFrequencyData(data);
          var sum = 0;
          for (var i = 0; i < data.length; i++) sum += data[i];
          meterBar.style.width = Math.min(100, (sum / data.length) * 2) + '%';
          requestAnimationFrame(tick);
        }
        tick();
      }

      /* ── Session lifecycle (direct Gemini Live) ── */
      async function startSession() {
        if (!state.assignmentId) return;
        errorsEl.textContent = '';
        setStatus('connecting');
        micBtn.disabled = true;
        micBtn.textContent = 'Connecting\u2026';
        conversationContext = [];
        answerReady = {};
        answerCandidate = {};
        currentQuestion = null;
        clarosOutputBuffer = '';
        userTranscriptBuffer = '';

        var config;
        try {
          var r = await fetch(API_BASE + '/api/session-config/' + state.assignmentId);
          if (!r.ok) throw new Error(r.status === 404 ? 'Assignment not found' : (await r.text()) || 'Session config failed');
          config = await r.json();
        } catch (e) {
          errorsEl.textContent = e.message || 'Failed to get session config';
          setStatus('idle');
          micBtn.disabled = false;
          micBtn.textContent = 'Start Session';
          return;
        }

        var GoogleGenAI;
        try {
          var mod = await import((API_BASE + '/genai.bundle.js'));
          GoogleGenAI = mod.GoogleGenAI || mod.default;
        } catch (e) {
          errorsEl.textContent = 'Failed to load Gemini SDK. ' + (e.message || 'Check console for details.');
          if (typeof console !== 'undefined' && console.error) console.error('Gemini SDK load error:', e);
          setStatus('idle');
          micBtn.disabled = false;
          micBtn.textContent = 'Start Session';
          return;
        }

        var ai = new GoogleGenAI({ apiKey: config.token });
        var session;
        try {
          session = await ai.live.connect({
            model: config.model,
            config: {
              responseModalities: ['AUDIO'],
              speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: 'Puck' } } },
              systemInstruction: { parts: [{ text: config.system_prompt || '' }] },
              inputAudioTranscription: {},
              outputAudioTranscription: {}
            },
            callbacks: {
              onmessage: function (msg) {
                var sc = msg.serverContent;
                if (!sc) return;
                if (sc.setupComplete) { setStatus('listening'); return; }
                if (sc.inputTranscription && sc.inputTranscription.text) {
                  userTranscriptBuffer += sc.inputTranscription.text;
                  clearPlayback();
                  activeClarosMsg = null;
                  if (currentMode === 'speaking') setStatus('listening');
                  showUserPartial(sc.inputTranscription.text);
                }
                if (sc.outputTranscription && sc.outputTranscription.text) {
                  var text = sc.outputTranscription.text;
                  conversationContext.push({ speaker: 'claros', text: text });
                  addTranscript('claros', text);
                  clarosOutputBuffer += text;
                  if (clarosOutputBuffer.length > 2000) clarosOutputBuffer = clarosOutputBuffer.slice(-1000);
                  var m = CLAROS_WRITE_PHRASE_RE.exec(clarosOutputBuffer);
                  if (m && !writeInProgress) {
                    var qid = parseInt(m[1], 10);
                    if (answerReady[qid]) {
                      clarosOutputBuffer = '';
                      triggerWrite(qid);
                    }
                  }
                }
                if (sc.modelTurn && sc.modelTurn.parts) {
                  for (var i = 0; i < sc.modelTurn.parts.length; i++) {
                    var part = sc.modelTurn.parts[i];
                    if (part.inlineData && part.inlineData.data) {
                      queuePcm24kChunk(part.inlineData.data);
                      if (!writeInProgress) setStatus('speaking');
                    }
                  }
                }
                if (sc.turnComplete) {
                  var full = userTranscriptBuffer.trim();
                  userTranscriptBuffer = '';
                  clearUserPartial();
                  activeClarosMsg = null;
                  setStatus('listening');
                  if (full) {
                    conversationContext.push({ speaker: 'user', text: full });
                    addTranscript('user', full);
                    var qm = QUESTION_NUM_RE.exec(full);
                    if (qm) currentQuestion = parseInt(qm[1], 10);
                    if (ANSWER_STATED_RE.test(full)) {
                      var tq = qm ? parseInt(qm[1], 10) : currentQuestion;
                      if (tq != null) {
                        answerReady[tq] = true;
                        answerCandidate[tq] = full;
                        var card = getCardEl(tq);
                        if (card) card.classList.add('answer-ready');
                      }
                    }
                    var hasIntent = WRITE_INTENT_RE.test(full);
                    var qid = qm ? parseInt(qm[1], 10) : (currentQuestion || 1);
                    if (hasIntent && answerReady[qid] && !writeInProgress) triggerWrite(qid);
                  }
                }
              },
              onerror: function (e) { errorsEl.textContent = (e && e.message) || 'Gemini Live error'; },
              onclose: function () { setStatus('idle'); stopSession(); }
            }
          });
        } catch (e) {
          errorsEl.textContent = (e && e.message) || 'Failed to connect to Gemini Live';
          setStatus('idle');
          micBtn.disabled = false;
          micBtn.textContent = 'Start Session';
          return;
        }

        liveSession = session;
        setStatus('listening');

        var stream;
        try {
          stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        } catch (e) {
          errorsEl.textContent = 'Microphone access denied';
          if (liveSession.close) liveSession.close();
          liveSession = null;
          setStatus('idle');
          micBtn.disabled = false;
          micBtn.textContent = 'Start Session';
          return;
        }
        mediaStream = stream;
        startMeter(stream);

        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        var inputRate = audioContext.sampleRate;
        var ratio = inputRate / SAMPLE_RATE;
        sourceNode = audioContext.createMediaStreamSource(stream);
        processorNode = audioContext.createScriptProcessor(1024, 1, 1);
        processorNode.onaudioprocess = function (e) {
          if (!liveSession) return;
          var input = e.inputBuffer.getChannelData(0);
          var outSamples = Math.floor(input.length / ratio);
          var out = new Int16Array(outSamples);
          for (var i = 0; i < outSamples; i++) {
            var idx = Math.min(Math.floor(i * ratio), input.length - 1);
            var s = Math.max(-1, Math.min(1, input[idx]));
            out[i] = s < 0 ? s * 32768 : s * 32767;
          }
          try {
            liveSession.sendRealtimeInput({ audio: { data: int16ArrayToBase64(out), mimeType: 'audio/pcm;rate=16000' } });
          } catch (_) {}
        };
        sourceNode.connect(processorNode);
        processorNode.connect(audioContext.destination);

        var SILENT_320 = new Int16Array(320);
        keepaliveInterval = setInterval(function () {
          if (!liveSession) return;
          try {
            liveSession.sendRealtimeInput({ audio: { data: int16ArrayToBase64(SILENT_320), mimeType: 'audio/pcm;rate=16000' } });
          } catch (_) {}
        }, 5000);

        micBtn.disabled = false;
        micBtn.textContent = 'End Session';
        micBtn.classList.add('stop');
      }

      function stopSession() {
        if (keepaliveInterval) { clearInterval(keepaliveInterval); keepaliveInterval = null; }
        clearPlayback();
        if (processorNode) {
          try { processorNode.disconnect(); sourceNode && sourceNode.disconnect(); } catch (_) {}
          processorNode = null; sourceNode = null;
        }
        if (mediaStream) { mediaStream.getTracks().forEach(function (t) { t.stop(); }); mediaStream = null; }
        if (liveSession && liveSession.close) { try { liveSession.close(); } catch (_) {} liveSession = null; }
        nextPlaybackTime = 0;
        if (audioContext) { audioContext.close(); audioContext = null; }
        meterBar.style.width = '0%';
        micBtn.disabled = !state.assignmentId;
        micBtn.textContent = 'Start Session';
        micBtn.classList.remove('stop');
        setStatus('idle');
        activeClarosMsg = null;
        clearUserPartial();
      }

      micBtn.addEventListener('click', function () {
        if (liveSession) stopSession();
        else startSession();
      });

      exportBtn.addEventListener('click', function () {
        if (!state.assignmentId) return;
        var answers = Object.entries(state.answers).map(function (entry) {
          return { question_id: parseInt(entry[0], 10), answer_text: entry[1] || '' };
        });
        var q = 'answers=' + encodeURIComponent(JSON.stringify(answers));
        window.location.href = '/export/' + state.assignmentId + '?' + q;
      });
    })();
  </script>
</body>
</html>
